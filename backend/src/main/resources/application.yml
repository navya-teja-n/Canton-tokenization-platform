spring:
  application:
    name: institutional-tokenization-backend

server:
  # Render (and most PaaS providers) inject a PORT env var the app must
  # bind to; falls back to 8080 for local development.
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.canton.platform: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"

platform:
  ledger:
    # Simulated Canton participant/ledger identifiers (would map to real
    # Canton domain + participant ids in production)
    participant-id: participant1
    ledger-id: canton-sim-ledger
  retry:
    max-attempts: 3
    initial-backoff-ms: 200
    multiplier: 2.0
  idempotency:
    ttl-seconds: 3600
  seed:
    # Populates the in-memory ledger with a reference portfolio (KYC
    # approvals, wallets, instruments, deposits, a pending trade and a
    # pending repo) on every startup, so the dashboard is never empty --
    # important because the ledger resets on restart. Set to false to
    # start with an empty ledger.
    enabled: true
